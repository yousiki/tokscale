name: Test & Coverage

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'packages/cli/package.json'
      - 'packages/tokscale/package.json'
      - 'packages/cli-*/package.json'
      - 'scripts/*.sh'
      - 'scripts/*.py'
      - '.github/workflows/build-native.yml'
      - '.github/workflows/publish-cli.yml'
      - '.github/workflows/test_coverage.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'packages/cli/package.json'
      - 'packages/tokscale/package.json'
      - 'packages/cli-*/package.json'
      - 'scripts/*.sh'
      - 'scripts/*.py'
      - '.github/workflows/build-native.yml'
      - '.github/workflows/publish-cli.yml'
      - '.github/workflows/test_coverage.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Verify version coherence
        run: bash scripts/check-version-coherence.sh
      - name: Run release helper tests
        run: |
          bash scripts/test-calculate-release-version.sh
          bash scripts/test-check-version-coherence.sh
          bash scripts/test-npm-release-state.sh
          bash scripts/test-prepare-release-provenance.sh
          bash scripts/test-release-workflow-safety.sh
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: lint-${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            lint-${{ runner.os }}-cargo-
      - name: Check formatting (strict)
        run: cargo fmt --all -- --check
      - name: Run Clippy (strict)
        run: cargo clippy --locked --workspace --all-features -- -D warnings

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: coverage-${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            coverage-${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace --all-features

      - name: Install cargo-tarpaulin
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Generate coverage report
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          cargo tarpaulin \
            --workspace \
            --all-features \
            --out Xml Json \
            --output-dir ./coverage \
            --timeout 300 \
            --fail-under 45 \
            --verbose

      - name: Extract coverage percentage
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        id: coverage
        run: |
          COVERAGE=$(cat ./coverage/tarpaulin-report.json | jq -r '
            [.files[]] |
            (map(.covered) | add) as $total_covered |
            (map(.coverable) | add) as $total_coverable |
            if $total_coverable > 0 then
              ($total_covered / $total_coverable * 100)
            else
              0
            end
          ')
          COVERAGE_INT=$(printf "%.0f" $COVERAGE)
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "percentage_int=$COVERAGE_INT" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"
          
          # Determine badge color
          if [ $COVERAGE_INT -gt 80 ]; then
            echo "color=green" >> $GITHUB_OUTPUT
          elif [ $COVERAGE_INT -gt 60 ]; then
            echo "color=yellow" >> $GITHUB_OUTPUT
          elif [ $COVERAGE_INT -gt 40 ]; then
            echo "color=orange" >> $GITHUB_OUTPUT
          else
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Create badges directory
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: mkdir -p .github/badges

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: emibcn/badge-action@v2.0.4
        with:
          label: 'coverage'
          status: ${{ steps.coverage.outputs.percentage_int }}%
          color: ${{ steps.coverage.outputs.color }}
          path: .github/badges/coverage.svg

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/badges/coverage.svg
          git diff --staged --quiet && exit 0
          git commit -m "ci: update coverage badge [skip ci]"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase -X theirs origin main || exit 1
          done
          git push

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v6
        if: "!cancelled() && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')"
        with:
          name: coverage-report
          path: ./coverage/
          retention-days: 7
